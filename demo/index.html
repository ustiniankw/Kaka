<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>Kaka</title>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#F2F2F7" />
<meta name="description" content="Kaka 桌面宠物 · iOS 风格 Web 试玩版" />
<link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🐾</text></svg>" />
<style>
/* ================= iOS System Palette ================= */
:root {
  --sys-bg:            #F2F2F7;   /* iOS system background (light) */
  --sys-bg-grouped:    #F2F2F7;
  --sys-surface:       #FFFFFF;
  --sys-surface-2:     #FFFFFF;
  --sys-fill:          rgba(120,120,128,0.12);
  --sys-separator:     rgba(60,60,67,0.18);
  --label:             #000;
  --label-secondary:   rgba(60,60,67,0.60);
  --label-tertiary:    rgba(60,60,67,0.30);
  --tint:              #007AFF;  /* iOS system blue */
  --tint-tap:          #0064D0;
  --green:             #34C759;
  --orange:            #FF9500;
  --pink:              #FF2D55;
  --red:               #FF3B30;
  --yellow:            #FFCC00;
  --purple:            #AF52DE;
  --gray:              #8E8E93;

  --radius-card:       14px;
  --radius-btn:        12px;
  --shadow-1:          0 1px 2px rgba(0,0,0,.04);
  --shadow-2:          0 8px 30px rgba(0,0,0,.06);

  --font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          "Helvetica Neue", "PingFang SC", "Hiragino Sans GB",
          "Microsoft YaHei", system-ui, sans-serif;
}
@media (prefers-color-scheme: dark) {
  :root {
    --sys-bg:            #000;
    --sys-bg-grouped:    #000;
    --sys-surface:       #1C1C1E;
    --sys-surface-2:     #2C2C2E;
    --sys-fill:          rgba(120,120,128,0.24);
    --sys-separator:     rgba(84,84,88,0.65);
    --label:             #FFF;
    --label-secondary:   rgba(235,235,245,0.60);
    --label-tertiary:    rgba(235,235,245,0.30);
    --tint:              #0A84FF;
    --tint-tap:          #409CFF;
    --green:             #30D158;
    --orange:            #FF9F0A;
    --pink:              #FF375F;
    --red:               #FF453A;
    --yellow:            #FFD60A;
    --purple:            #BF5AF2;
    --gray:              #98989F;
  }
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  background: var(--sys-bg);
  color: var(--label);
  font-family: var(--font);
  font-size: 15px;
  line-height: 1.35;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
}

.wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 20px 20px 60px;
}

/* ================= Nav bar ================= */
.navbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 4px 22px;
}
.navbar .title {
  font-size: 34px;
  font-weight: 700;
  letter-spacing: -0.4px;
}
.navbar .title .emoji { margin-right: 4px; }
.navbar .subtitle {
  font-size: 13px;
  color: var(--label-secondary);
  margin-top: 2px;
}
.navbar a {
  color: var(--tint);
  text-decoration: none;
  font-weight: 500;
  font-size: 15px;
}
.navbar a:active { color: var(--tint-tap); }

/* ================= Layout ================= */
.grid {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 340px;
  gap: 16px;
}
@media (max-width: 900px) {
  .grid { grid-template-columns: 1fr; }
}

/* ================= Stage (Pet canvas card) ================= */
.stage-card {
  background: var(--sys-surface);
  border-radius: var(--radius-card);
  overflow: hidden;
  box-shadow: var(--shadow-2);
  position: relative;
  /* subtle top border for definition */
  border: 1px solid var(--sys-separator);
}
.stage-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px;
  border-bottom: 1px solid var(--sys-separator);
  min-height: 40px;
}
.stage-header .badge {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  background: var(--sys-fill);
  font-size: 12px;
  font-weight: 500;
  color: var(--label-secondary);
}
.stage-header .badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); }
.stage-header .name-line {
  font-size: 14px;
  font-weight: 600;
  color: var(--label);
  letter-spacing: -0.2px;
}
.stage-header .name-line .emoji { margin-right: 4px; }
.stage-header .name-line .quirk {
  color: var(--label-secondary);
  font-weight: 400;
  margin-left: 6px;
}
canvas#stage {
  display: block;
  width: 100%;
  height: 520px;
  background: var(--sys-surface);
  cursor: pointer;
}
.toast {
  position: absolute;
  top: 60px; left: 50%;
  transform: translate(-50%, -8px);
  background: rgba(28,28,30,.92);
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 14px;
  border-radius: 999px;
  opacity: 0;
  transition: opacity .25s ease, transform .25s ease;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  pointer-events: none;
  z-index: 3;
}
.toast.show { opacity: 1; transform: translate(-50%, 0); }

/* ================= iOS-style grouped list ================= */
.section-title {
  padding: 8px 16px 6px;
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.4px;
  color: var(--label-secondary);
  font-weight: 500;
}
.list-group {
  background: var(--sys-surface);
  border-radius: var(--radius-card);
  overflow: hidden;
  border: 1px solid var(--sys-separator);
  margin-bottom: 20px;
}
.list-group + .section-title { margin-top: 8px; }
.row {
  display: flex; align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--sys-separator);
  min-height: 44px;
}
.row:first-child { border-top: 0; }
.row .icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: inline-flex; align-items: center; justify-content: center;
  color: #fff;
  font-size: 16px;
  margin-right: 12px;
  flex-shrink: 0;
}
.icon.blue   { background: var(--tint); }
.icon.green  { background: var(--green); }
.icon.orange { background: var(--orange); }
.icon.pink   { background: var(--pink); }
.icon.purple { background: var(--purple); }
.icon.gray   { background: var(--gray); }
.icon.yellow { background: var(--yellow); color: #000; }
.icon.red    { background: var(--red); }

.row .label {
  flex: 1;
  font-size: 15px;
  color: var(--label);
}
.row .value {
  font-size: 14px;
  color: var(--label-secondary);
}
.row .chevron {
  margin-left: 8px;
  color: var(--label-tertiary);
  font-size: 18px;
}
.row.tap { cursor: pointer; }
.row.tap:active { background: var(--sys-fill); }

/* iOS switch */
.switch { position: relative; width: 51px; height: 31px; flex-shrink: 0; }
.switch input { opacity: 0; width: 0; height: 0; }
.switch .slider {
  position: absolute; inset: 0;
  background: var(--sys-fill);
  border-radius: 999px;
  transition: background .2s;
}
.switch .slider::before {
  content: "";
  position: absolute; height: 27px; width: 27px;
  left: 2px; top: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 3px 8px rgba(0,0,0,.15), 0 3px 1px rgba(0,0,0,.06);
  transition: transform .2s;
}
.switch input:checked + .slider { background: var(--green); }
.switch input:checked + .slider::before { transform: translateX(20px); }

/* Buttons (large filled) */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 6px;
  width: 100%;
  padding: 14px 18px;
  background: var(--tint);
  color: #fff;
  font-weight: 600;
  font-size: 16px;
  border-radius: var(--radius-btn);
  border: 0; cursor: pointer;
  transition: background .15s ease, transform .05s ease;
}
.btn:active { background: var(--tint-tap); transform: scale(0.995); }
.btn.secondary { background: var(--sys-fill); color: var(--tint); }
.btn.destructive { background: var(--sys-fill); color: var(--red); }
.btn-row {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px;
  padding: 12px 12px;
}
.btn-row.single { grid-template-columns: 1fr; }

/* Segmented control */
.segment {
  display: flex;
  background: var(--sys-fill);
  padding: 2px;
  border-radius: 9px;
  margin: 8px 12px;
}
.segment button {
  flex: 1;
  padding: 6px 4px;
  border: 0; background: transparent;
  color: var(--label);
  font-size: 13px; font-weight: 500;
  border-radius: 7px;
  cursor: pointer;
  transition: background .15s, color .15s, box-shadow .15s;
}
.segment button.active {
  background: var(--sys-surface-2);
  box-shadow: 0 1px 2px rgba(0,0,0,.1);
}
@media (prefers-color-scheme: dark) {
  .segment button.active { background: #48484A; }
}

/* Stat bars */
.bar-row {
  display: flex; align-items: center;
  padding: 10px 16px;
  border-top: 1px solid var(--sys-separator);
  gap: 12px;
}
.bar-row:first-child { border-top: 0; }
.bar-row .icon { margin-right: 0; }
.bar-row .bar-label { width: 60px; font-size: 14px; color: var(--label); }
.bar-row .bar {
  flex: 1; height: 6px;
  background: var(--sys-fill);
  border-radius: 999px;
  overflow: hidden;
}
.bar-row .bar > i {
  display: block; height: 100%; border-radius: 999px;
  background: var(--tint);
  transition: width .3s ease;
}
.bar-row .bar.mood > i    { background: var(--pink); }
.bar-row .bar.hygiene > i { background: var(--green); }
.bar-row .bar.affinity > i{ background: var(--orange); }
.bar-row .bar-value {
  width: 42px; text-align: right;
  font-size: 13px; color: var(--label-secondary);
  font-variant-numeric: tabular-nums;
}

/* Personality picker */
.pers-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  padding: 12px;
}
.pers-tile {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 10px 4px;
  background: var(--sys-fill);
  border-radius: 12px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: border-color .15s ease, background .15s ease;
  user-select: none;
}
.pers-tile:active { transform: scale(.98); }
.pers-tile.active {
  border-color: var(--tint);
  background: color-mix(in srgb, var(--tint) 8%, var(--sys-surface));
}
.pers-tile .em { font-size: 22px; line-height: 1; }
.pers-tile .nm { font-size: 12px; font-weight: 500; color: var(--label); }

.pers-flavor {
  padding: 4px 16px 14px;
  font-size: 12px;
  color: var(--label-secondary);
  line-height: 1.5;
}

/* Footer */
footer {
  text-align: center;
  color: var(--label-secondary);
  font-size: 12px;
  padding-top: 24px;
}
footer a { color: var(--tint); text-decoration: none; }

.hint {
  padding: 10px 16px 14px;
  font-size: 12px;
  color: var(--label-secondary);
}
.hint kbd {
  background: var(--sys-fill);
  border-radius: 4px;
  padding: 1px 5px;
  font-family: ui-monospace, Menlo, monospace;
  font-size: 11px;
}
</style>
</head>
<body>
<div class="wrap">

  <div class="navbar">
    <div>
      <div class="title"><span class="emoji">🐾</span>Kaka</div>
      <div class="subtitle">桌面摸鱼搭子 · Web 试玩版</div>
    </div>
    <a href="https://github.com/ustiniankw/Kaka" target="_blank" rel="noreferrer">GitHub ›</a>
  </div>

  <div class="grid">

    <!-- Stage -->
    <div class="stage-card">
      <div class="stage-header">
        <div class="name-line">
          <span class="emoji" id="header-emoji">🥳</span><span id="header-name">Kaka</span>
          <span class="quirk" id="header-quirk">· 社牛</span>
        </div>
        <div class="badge">
          <span class="dot"></span>
          <span id="badge-state">Online · walking</span>
        </div>
      </div>
      <canvas id="stage" width="800" height="520"></canvas>
      <div class="toast" id="toast">欢迎来到 Kaka 试玩版</div>
    </div>

    <!-- Right pane -->
    <aside>
      <!-- Personality -->
      <div class="section-title">性格</div>
      <div class="list-group">
        <div class="pers-grid" id="pers-grid"></div>
        <div class="pers-flavor" id="pers-flavor"></div>
        <div class="btn-row single">
          <button class="btn secondary" id="btn-reroll">🎲 随机来一只</button>
        </div>
      </div>

      <!-- Controls -->
      <div class="section-title">控制</div>
      <div class="list-group">
        <div class="row">
          <div class="icon green">🌍</div>
          <div class="label">重力</div>
          <label class="switch">
            <input type="checkbox" id="tg-gravity" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="row">
          <div class="icon gray">👀</div>
          <div class="label">显示 Kaka</div>
          <label class="switch">
            <input type="checkbox" id="tg-visible" checked />
            <span class="slider"></span>
          </label>
        </div>
        <div class="btn-row">
          <button class="btn" id="btn-feed">🍪 喂食</button>
          <button class="btn secondary" id="btn-poop">💩 立刻拉</button>
        </div>
        <div class="btn-row single">
          <button class="btn destructive" id="btn-reset">重置状态</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="section-title">状态</div>
      <div class="list-group" id="stats-group">
        <div class="bar-row">
          <div class="icon yellow">🍚</div>
          <div class="bar-label">饥饿</div>
          <div class="bar"><i id="bar-hunger"></i></div>
          <div class="bar-value" id="val-hunger">0</div>
        </div>
        <div class="bar-row">
          <div class="icon pink">😊</div>
          <div class="bar-label">心情</div>
          <div class="bar mood"><i id="bar-mood"></i></div>
          <div class="bar-value" id="val-mood">0</div>
        </div>
        <div class="bar-row">
          <div class="icon green">🧼</div>
          <div class="bar-label">卫生</div>
          <div class="bar hygiene"><i id="bar-hygiene"></i></div>
          <div class="bar-value" id="val-hygiene">0</div>
        </div>
        <div class="bar-row">
          <div class="icon orange">💛</div>
          <div class="bar-label">好感度</div>
          <div class="bar affinity"><i id="bar-affinity"></i></div>
          <div class="bar-value" id="val-affinity">0</div>
        </div>
      </div>

      <div class="hint">
        点 Kaka <b>摸头</b> · 拖动 <b>扔飞</b> · 单击地上物 <b>清理/吃掉</b><br>
        桌面版全局老板键：<kbd>Ctrl</kbd> + <kbd>Alt</kbd> + <kbd>H</kbd>
      </div>

    </aside>
  </div>

  <footer>
    Made with ❤️ · <a href="https://github.com/ustiniankw/Kaka">github.com/ustiniankw/Kaka</a>
  </footer>
</div>

<script>
(() => {
// ====================== Personality catalog (mirror of Python side) ======================
const PERSONALITIES = {
  introvert: { emoji:'🫥', name:'社恐',   walkSpeed:0.75, walkProb:0.30, poopFreq:1.0,
               hungerDecay:0.9, moodDecay:1.1, rejectPet:0.0,  bubble:0.0,
               flavor:'喜欢待在墙角，被摸时会稍稍愣一下' },
  chatty:    { emoji:'🗣️', name:'话痨',  walkSpeed:1.10, walkProb:0.60, poopFreq:1.0,
               hungerDecay:1.0, moodDecay:0.9, rejectPet:0.0,  bubble:0.35,
               flavor:'总有话想说，会时不时冒对话气泡' },
  lazy:      { emoji:'😴', name:'懒鬼',   walkSpeed:0.55, walkProb:0.20, poopFreq:0.7,
               hungerDecay:0.75,moodDecay:0.85,rejectPet:0.0, bubble:0.0,
               flavor:'能坐着就不站着，看到食物才勉强动一下' },
  foodie:    { emoji:'🍗', name:'干饭王', walkSpeed:1.20, walkProb:0.55, poopFreq:1.5,
               hungerDecay:1.4, moodDecay:1.0, rejectPet:0.0,  bubble:0.0,
               flavor:'看到食物飞奔而至，也拉得多' },
  grumpy:    { emoji:'😤', name:'暴躁',   walkSpeed:1.30, walkProb:0.60, poopFreq:1.2,
               hungerDecay:1.1, moodDecay:1.4, rejectPet:0.0,  bubble:0.0,
               flavor:'心情容易掉，掉到底会跺脚' },
  tsundere:  { emoji:'😳', name:'傲娇',   walkSpeed:1.00, walkProb:0.50, poopFreq:1.0,
               hungerDecay:1.0, moodDecay:1.0, rejectPet:0.30, bubble:0.0,
               flavor:'摸头有 30% 概率不领情，但心里其实很开心' },
  extrovert: { emoji:'🥳', name:'社牛',   walkSpeed:1.40, walkProb:0.75, poopFreq:1.0,
               hungerDecay:1.1, moodDecay:0.8, rejectPet:0.0,  bubble:0.15,
               flavor:'满屏跑，跑到屏幕边缘会挥手' },
};
const KEYS = Object.keys(PERSONALITIES);

// ====================== Canvas / state ======================
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
const toast = document.getElementById('toast');

function resize() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resize);
resize();
const W = () => canvas.clientWidth;
const H = () => canvas.clientHeight;

const PET = 90;
const WASTE = 32;
const FLOOR_MARGIN = 8;

const state = {
  personality: 'extrovert',
  pet: {
    x: W() * 0.7, y: 0, vx:0, vy:0,
    facing: 1,
    behaviour: 'idle',
    until: 0,
    floatPhase: Math.random() * Math.PI * 2,
    target: null,
    visible: true,
    bubbleUntil: 0,
    bubbleText: '',
    footStompUntil: 0,
  },
  gravity: true,
  entities: [],
  stats: { hunger: 60, mood: 65, hygiene: 85, affinity: 15 },
  dragOffset: null,
  lastDragT: 0, lastDragX: 0, lastDragY: 0,
};
state.pet.y = H() - PET - FLOOR_MARGIN;

const rand  = (a,b) => a + Math.random()*(b-a);
const clamp = (v,lo=0,hi=100) => Math.max(lo, Math.min(hi, v));

function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove('show'), 2000);
}

function persona() { return PERSONALITIES[state.personality]; }

function setPersonality(key) {
  if (!PERSONALITIES[key]) return;
  state.personality = key;
  // refresh header + tiles
  document.getElementById('header-emoji').textContent = persona().emoji;
  document.getElementById('header-quirk').textContent = '· ' + persona().name;
  document.getElementById('pers-flavor').textContent = persona().flavor;
  document.querySelectorAll('.pers-tile').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });
  // reset any timing derived state
  scheduleNextPoop();
  scheduleNextBubble();
  showToast(persona().emoji + ' 现在是 ' + persona().name);
}

// Build personality picker
const grid = document.getElementById('pers-grid');
KEYS.forEach(k => {
  const p = PERSONALITIES[k];
  const el = document.createElement('div');
  el.className = 'pers-tile';
  el.dataset.key = k;
  el.innerHTML = `<div class="em">${p.emoji}</div><div class="nm">${p.name}</div>`;
  el.onclick = () => setPersonality(k);
  grid.appendChild(el);
});

document.getElementById('btn-reroll').onclick = () => {
  let k = state.personality;
  while (k === state.personality) k = KEYS[Math.floor(Math.random() * KEYS.length)];
  setPersonality(k);
};

// ====================== Sprite drawing ======================
function drawPet(x, y, mood, flip) {
  const g = 16, size = PET, c = size / g;
  ctx.save();
  ctx.translate(x, y);
  if (flip) { ctx.translate(size, 0); ctx.scale(-1, 1); }
  ctx.imageSmoothingEnabled = false;
  const R = (px,py,w=1,h=1,col) => { ctx.fillStyle = col; ctx.fillRect(px*c, py*c, w*c, h*c); };
  const BODY='#F5C542', DARK='#C08A18', CHEEK='#F58A8A', EYE='#222', WHITE='#fff';
  R(4,3,8,1,BODY); R(3,4,10,1,BODY);
  R(2,5,12,6,BODY);
  R(3,11,10,1,BODY); R(4,12,8,1,BODY);
  R(4,13,3,1,BODY); R(9,13,3,1,BODY);
  R(3,10,10,1,DARK); R(4,11,8,1,DARK);
  if (mood === 'sleepy')     { R(5,7,2,1,EYE); R(9,7,2,1,EYE); }
  else if (mood === 'wink')  { R(5,6,2,2,WHITE); R(6,7,1,1,EYE); R(9,7,2,1,EYE); }
  else if (mood === 'angry') { R(4,5,2,1,EYE); R(10,5,2,1,EYE); R(5,7,2,1,EYE); R(9,7,2,1,EYE); }
  else                       { R(5,6,2,2,WHITE); R(9,6,2,2,WHITE); R(6,7,1,1,EYE); R(10,7,1,1,EYE); }
  R(4,9,1,1,CHEEK); R(11,9,1,1,CHEEK);
  if (mood === 'sad')         { R(6,9,1,1,EYE); R(9,9,1,1,EYE); R(7,10,2,1,EYE); }
  else if (mood === 'hungry') { R(7,9,2,2,EYE); }
  else                        { R(7,10,2,1,EYE); }
  ctx.restore();
}

function drawEntity(e) {
  ctx.font = (WASTE * 0.85) + "px 'Apple Color Emoji','Segoe UI Emoji',sans-serif";
  ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
  ctx.fillText(e.glyph, e.x + WASTE/2, e.y + WASTE/2);
}

function drawBubble(text, cx, cy) {
  ctx.save();
  ctx.font = '13px ' + '-apple-system, "PingFang SC", sans-serif';
  const padX = 8, padY = 5;
  const m = ctx.measureText(text);
  const w = m.width + padX*2;
  const h = 22;
  const x = cx - w/2, y = cy - h - 8;
  // rounded rect
  const r = 10;
  ctx.fillStyle = 'rgba(28,28,30,.92)';
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+w/2+5, y+h);
  ctx.lineTo(x+w/2, y+h+6);
  ctx.lineTo(x+w/2-5, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(text, cx, y + h/2);
  ctx.restore();
}

function drawScene() {
  ctx.clearRect(0, 0, W(), H());
  // floor guide line (very subtle in iOS mode)
  const fy = H() - FLOOR_MARGIN;
  ctx.strokeStyle = 'rgba(60,60,67,.10)';
  ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.moveTo(0, fy); ctx.lineTo(W(), fy); ctx.stroke();
  ctx.setLineDash([]);

  for (const e of state.entities) drawEntity(e);
  if (state.pet.visible) {
    drawPet(state.pet.x, state.pet.y, moodLabel(), state.pet.facing < 0);
    if (performance.now() < state.pet.bubbleUntil) {
      drawBubble(state.pet.bubbleText, state.pet.x + PET/2, state.pet.y);
    }
  }
}

function moodLabel() {
  const s = state.stats;
  const p = persona();
  if (state.pet.behaviour === 'drag') return 'wink';
  if (s.hunger < 20) return 'hungry';
  if (s.mood < 15) return p.name === '暴躁' ? 'angry' : 'sad';
  if (s.mood < 30) return 'sad';
  if (s.mood > 80) return 'wink';
  return 'happy';
}

function updateHeaderState() {
  const b = state.pet.behaviour;
  const label = ({
    'idle':'idle', 'walk':'walking', 'fall':'falling',
    'float':'floating', 'drag':'held', 'eat':'eating',
  })[b] || b;
  document.getElementById('badge-state').textContent = state.pet.visible
    ? 'Online · ' + label
    : 'Hidden';
}

// ====================== Behaviour ======================
function pickNextAction() {
  const walkProb = persona().walkProb;
  if (Math.random() < walkProb) {
    state.pet.facing = Math.random() < 0.5 ? -1 : 1;
    state.pet.behaviour = 'walk';
    state.pet.until = performance.now() + rand(2000, 5500);
  } else {
    state.pet.behaviour = 'idle';
    state.pet.until = performance.now() + rand(1500, 4000);
  }
}

function tick(dtMs) {
  const p = state.pet;
  const per = persona();
  const floorY = H() - PET - FLOOR_MARGIN;
  const dt = dtMs / 16.67;

  if (p.behaviour === 'drag') { /* handled */ }
  else if (state.gravity) {
    if (p.y < floorY) {
      p.vy = Math.min(22, p.vy + 1.2 * dt);
      p.y += p.vy * dt;
      p.vx *= Math.pow(0.9, dt);
      p.x += p.vx * dt;
      if (p.y >= floorY) { p.y = floorY; p.vy = 0; if (Math.abs(p.vx) < 0.5) p.vx = 0; }
      p.behaviour = p.y >= floorY ? 'idle' : 'fall';
    } else if (p.behaviour === 'walk') {
      walkStep(dt);
    } else {
      if (performance.now() > p.until) pickNextAction();
    }
  } else {
    if (p.behaviour === 'walk') { walkStep(dt); }
    else {
      p.floatPhase += (dtMs / 2600) * Math.PI * 2;
      const bob = Math.sin(p.floatPhase) * 1.5;
      p.x += p.vx * dt;
      p.y += p.vy * dt + bob;
      p.vx *= Math.pow(0.98, dt);
      p.vy *= Math.pow(0.98, dt);
      p.behaviour = 'float';
      if (performance.now() > p.until) pickNextAction();
    }
  }

  p.x = Math.max(0, Math.min(W() - PET, p.x));
  p.y = Math.max(0, Math.min(floorY, p.y));

  // stats decay
  state.stats.hunger  = clamp(state.stats.hunger  - 0.02 * dt * per.hungerDecay);
  state.stats.mood    = clamp(state.stats.mood    - 0.005 * dt * per.moodDecay);
  state.stats.hygiene = clamp(state.stats.hygiene - 0.01 * dt);
  if (state.stats.hunger < 20) state.stats.mood = clamp(state.stats.mood - 0.02 * dt);

  refreshBars();
  updateHeaderState();
}

function walkStep(dt) {
  const p = state.pet;
  const per = persona();
  const speed = 1.6 * (0.7 + state.stats.mood / 150) * per.walkSpeed * dt;
  if (p.target != null) {
    const dx = p.target - p.x;
    p.facing = dx < 0 ? -1 : 1;
    p.x += Math.sign(dx) * Math.min(Math.abs(dx), speed);
    if (state.gravity) p.y = H() - PET - FLOOR_MARGIN;
    if (Math.abs(p.target - p.x) < speed) {
      p.target = null;
      p.behaviour = 'idle';
      p.until = performance.now() + rand(1500, 3000);
    }
  } else {
    p.x += p.facing * speed;
    if (state.gravity) p.y = H() - PET - FLOOR_MARGIN;
    if (p.x <= 0)         { p.x = 0;              p.facing = 1;
      if (per.name === '社牛') triggerBubble('嗨！', 1500);
    }
    if (p.x >= W() - PET) { p.x = W() - PET;      p.facing = -1;
      if (per.name === '社牛') triggerBubble('嗨！', 1500);
    }
    if (performance.now() > p.until) pickNextAction();
  }
}

function triggerBubble(text, durMs=2000) {
  state.pet.bubbleText = text;
  state.pet.bubbleUntil = performance.now() + durMs;
}

// ====================== Bubbles for chatty ======================
const CHATTY_LINES = [
  '在吗？', '烦了怎么办', '你今天真好看', '摸鱼冠军是我',
  '我要 Star ⭐️', '啊 CPU 好烫', '要吃的', '午安~',
];
let nextBubbleAt = performance.now() + 8000;
function scheduleNextBubble() {
  nextBubbleAt = performance.now() + rand(6000, 12000);
}
function maybeBubble(now) {
  const bp = persona().bubble;
  if (bp <= 0) return;
  if (now < nextBubbleAt) return;
  if (Math.random() < bp) {
    triggerBubble(CHATTY_LINES[Math.floor(Math.random() * CHATTY_LINES.length)], 2200);
  }
  scheduleNextBubble();
}

// ====================== Poop scheduler ======================
let nextPoopAt = performance.now() + rand(15000, 45000);
function scheduleNextPoop() {
  const mult = persona().poopFreq;
  const lo = 15000 / Math.max(0.5, mult);
  const hi = 45000 / Math.max(0.5, mult);
  nextPoopAt = performance.now() + rand(lo, hi);
}
function maybePoop(now) {
  if (now >= nextPoopAt) { spawnPoop(); scheduleNextPoop(); }
}
function spawnPoop(force=false) {
  const p = state.pet;
  const isPee = Math.random() < 0.4;
  const glyph = isPee ? '💦' : '💩';
  const x = p.x + PET/2 - WASTE/2;
  const y = state.gravity ? (H() - WASTE - FLOOR_MARGIN) : (p.y + PET/2);
  state.entities.push({ kind: isPee ? 'pee' : 'poop', x, y, glyph });
  state.stats.hygiene = clamp(state.stats.hygiene - 12);
  state.stats.mood = clamp(state.stats.mood + 2);
  if (force) showToast(isPee ? '💦 Kaka 尿了一泡' : '💩 Kaka 拉了一坨');
}

// ====================== Feed ======================
function feed() {
  const glyphs = ['🍪','🍔','🍎','🍣','🥕'];
  const g = glyphs[Math.floor(Math.random() * glyphs.length)];
  const x = Math.random() * (W() - WASTE);
  const y = H() - WASTE - FLOOR_MARGIN;
  state.entities.push({ kind: 'food', x, y, glyph: g });
  state.pet.target = x;
  state.pet.behaviour = 'walk';
  state.pet.until = performance.now() + 12000;
  showToast('丢了 ' + g + '，Kaka 出发！');
}
setInterval(() => {
  for (let i = state.entities.length - 1; i >= 0; i--) {
    const e = state.entities[i];
    if (e.kind !== 'food') continue;
    if (Math.abs(e.x + WASTE/2 - (state.pet.x + PET/2)) < PET*0.55) {
      state.entities.splice(i, 1);
      const boost = 30 * (persona().name === '干饭王' ? 1.1 : 1);
      state.stats.hunger = clamp(state.stats.hunger + boost);
      state.stats.mood = clamp(state.stats.mood + 5);
      state.stats.affinity = clamp(state.stats.affinity + 2);
      state.pet.target = null;
      state.pet.behaviour = 'idle';
      if (persona().name === '干饭王') triggerBubble('干！', 1500);
      showToast('好吃！心情+5，好感度+2');
    }
  }
}, 250);

// ====================== Interaction ======================
function canvasPos(evt) {
  const r = canvas.getBoundingClientRect();
  const t = evt.touches ? evt.touches[0] : evt;
  return { x: t.clientX - r.left, y: t.clientY - r.top };
}
function hitPet(pos) {
  const p = state.pet;
  return pos.x >= p.x && pos.x <= p.x + PET && pos.y >= p.y && pos.y <= p.y + PET;
}
function hitEntity(pos) {
  for (let i = state.entities.length - 1; i >= 0; i--) {
    const e = state.entities[i];
    if (pos.x >= e.x && pos.x <= e.x + WASTE && pos.y >= e.y && pos.y <= e.y + WASTE) {
      return { entity: e, index: i };
    }
  }
  return null;
}

canvas.addEventListener('mousedown', (e) => {
  const pos = canvasPos(e);
  if (state.pet.visible && hitPet(pos)) {
    state.pet.behaviour = 'drag';
    state.dragOffset = { x: pos.x - state.pet.x, y: pos.y - state.pet.y };
    state.lastDragT = performance.now();
    state.lastDragX = pos.x; state.lastDragY = pos.y;
    state.pet.vx = 0; state.pet.vy = 0;
    return;
  }
  const hit = hitEntity(pos);
  if (hit) {
    const e2 = hit.entity;
    if (e2.kind === 'food') {
      state.entities.splice(hit.index, 1);
      state.pet.target = e2.x;
      state.pet.behaviour = 'walk';
    } else {
      state.entities.splice(hit.index, 1);
      state.stats.hygiene = clamp(state.stats.hygiene + 10);
      state.stats.affinity = clamp(state.stats.affinity + 0.5);
      showToast('清理完成！卫生+10');
    }
  }
});

canvas.addEventListener('mousemove', (e) => {
  if (state.pet.behaviour === 'drag') {
    const pos = canvasPos(e);
    state.pet.x = pos.x - state.dragOffset.x;
    state.pet.y = pos.y - state.dragOffset.y;
    const now = performance.now();
    const dt = Math.max(1, now - state.lastDragT);
    state.pet.vx = (pos.x - state.lastDragX) / dt * 16;
    state.pet.vy = (pos.y - state.lastDragY) / dt * 16;
    state.lastDragT = now;
    state.lastDragX = pos.x; state.lastDragY = pos.y;
  }
});

window.addEventListener('mouseup', (e) => {
  if (state.pet.behaviour === 'drag') {
    if (Math.abs(state.pet.vx) < 1 && Math.abs(state.pet.vy) < 1) {
      // pet: personality may reject
      if (Math.random() < persona().rejectPet) {
        state.stats.affinity = clamp(state.stats.affinity + 0.3);
        triggerBubble('哼！', 1200);
        showToast('傲娇拒绝了摸头（但好感度+0.3）');
      } else {
        state.stats.mood = clamp(state.stats.mood + 3);
        state.stats.affinity = clamp(state.stats.affinity + 1);
        showToast('摸头成功！心情+3');
      }
      state.pet.behaviour = 'idle';
    } else {
      state.pet.behaviour = state.gravity ? 'fall' : 'float';
    }
    state.dragOffset = null;
  }
});

// ====================== Buttons / toggles ======================
document.getElementById('btn-feed').onclick = feed;
document.getElementById('btn-poop').onclick = () => spawnPoop(true);
document.getElementById('btn-reset').onclick = () => {
  state.entities = [];
  state.stats = { hunger: 60, mood: 65, hygiene: 85, affinity: 15 };
  state.pet.x = W() * 0.7;
  state.pet.y = H() - PET - FLOOR_MARGIN;
  state.pet.behaviour = 'idle';
  state.pet.target = null;
  document.getElementById('tg-gravity').checked = true;
  document.getElementById('tg-visible').checked = true;
  state.gravity = true;
  state.pet.visible = true;
  showToast('已重置');
};
document.getElementById('tg-gravity').onchange = (e) => {
  state.gravity = e.target.checked;
  state.pet.vy = 0;
  showToast(state.gravity ? '重力已开' : '重力已关');
};
document.getElementById('tg-visible').onchange = (e) => {
  state.pet.visible = e.target.checked;
  showToast(state.pet.visible ? 'Kaka 出现' : 'Kaka 藏好了 🕶');
};

// ====================== Bars ======================
function refreshBars() {
  const s = state.stats;
  const set = (id, v) => document.getElementById('bar-'+id).style.width = v + '%';
  set('hunger', s.hunger); set('mood', s.mood); set('hygiene', s.hygiene); set('affinity', s.affinity);
  const setV = (id, v) => document.getElementById('val-'+id).textContent = Math.round(v);
  setV('hunger', s.hunger); setV('mood', s.mood); setV('hygiene', s.hygiene); setV('affinity', s.affinity);
}

// ====================== Main loop ======================
let last = performance.now();
function loop(t) {
  const dt = Math.min(64, t - last);
  last = t;
  tick(dt);
  maybePoop(t);
  maybeBubble(t);
  drawScene();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// initial
setPersonality('extrovert');
refreshBars();
setTimeout(() => showToast('欢迎来到 Kaka · 摸我试试'), 400);
})();
</script>
