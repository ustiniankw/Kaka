<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Kaka Desktop · 离线</title>
  <style>
    html,body{margin:0;width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.0);font-family:-apple-system,BlinkMacSystemFont,"PingFang SC",system-ui,sans-serif;}
    .card{background:rgba(28,28,30,.92);color:#fff;border-radius:16px;padding:18px 18px;min-width:260px;max-width:380px;box-shadow:0 10px 30px rgba(0,0,0,.25);}
    h1{font-size:16px;margin:0 0 6px}
    p{font-size:12px;opacity:.8;line-height:1.6;margin:0 0 12px}
    button{all:unset;display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:12px;background:#0A84FF;color:#fff;font-weight:700;cursor:pointer}
    button:active{filter:brightness(.92)}
  </style>
</head>
<body>
  <div class="card">
    <h1>网络似乎开小差了</h1>
    <p>Kaka 桌面版会从 GitHub Pages 加载 UI。你可以稍后再试，或检查网络/代理。</p>
    <button onclick="location.reload()">重新加载</button>
  </div>
</body>
</html>
