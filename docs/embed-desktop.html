<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Kaka Desktop Embed</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="description" content="Kaka 桌面版（Electron）全屏透明 UI · pet-first" />
  <style>
    :root{--glass:rgba(255,255,255,.86);--sep:rgba(60,60,67,.16);--label:#111;--label-2:rgba(60,60,67,.6);--tint:#0A84FF;--red:#FF3B30;
      --pink:#FF2D55;--orange:#FF9500;--shadow:0 20px 50px rgba(0,0,0,.25);}
    @media (prefers-color-scheme:dark){:root{--glass:rgba(28,28,30,.88);--sep:rgba(84,84,88,.5);--label:#fff;--label-2:rgba(235,235,245,.6);}}
    html,body{margin:0;background:transparent;overflow:hidden;width:100vw;height:100vh;user-select:none;
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC",system-ui,sans-serif;}
    #stage{position:fixed;inset:0;}
    canvas{display:block;width:100%;height:100%;touch-action:none;}
    body.dnd canvas{opacity:.18;filter:grayscale(.65);}

    /* radial menu (full: 6 items) */
    .radial{position:fixed;z-index:14;width:0;height:0;pointer-events:none}
    .rad-btn{position:fixed;left:0;top:0;width:46px;height:46px;border:0;border-radius:50%;
      background:var(--glass);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid var(--sep);box-shadow:0 8px 24px rgba(0,0,0,.3);color:var(--label);
      font-size:21px;display:flex;align-items:center;justify-content:center;cursor:pointer;
      opacity:0;transform:translate(-50%,-50%) scale(.2);pointer-events:none;
      transition:opacity .16s ease-out, transform .28s cubic-bezier(.2,.9,.3,1.35), background .12s, color .12s}
    .radial.show .rad-btn{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
    .rad-btn:hover{background:var(--tint);color:#fff;transform:translate(-50%,-50%) scale(1.16)}
    .rad-tip{position:absolute;top:50px;left:50%;transform:translateX(-50%);font-size:11px;font-weight:600;white-space:nowrap;
      background:rgba(28,28,30,.9);color:#fff;padding:2px 7px;border-radius:6px;opacity:0;transition:.12s;pointer-events:none}
    .rad-btn:hover .rad-tip{opacity:1}

    /* hover status card */
    .hovercard{position:fixed;z-index:13;background:var(--glass);backdrop-filter:blur(20px) saturate(180%);
      -webkit-backdrop-filter:blur(20px) saturate(180%);border:1px solid var(--sep);border-radius:12px;padding:7px 12px;
      box-shadow:0 12px 30px rgba(0,0,0,.22);font-size:12px;color:var(--label);white-space:nowrap;
      opacity:0;transform:translate(-50%,-4px);pointer-events:none;transition:.16s}
    .hovercard.show{opacity:1;transform:translate(-50%,-10px)}
    .hovercard .i{display:inline-flex;gap:3px;margin:0 5px}.hovercard b{font-variant-numeric:tabular-nums}

    /* command card (double-click Kaka) */
    .panel{position:fixed;z-index:15;width:280px;background:var(--glass);
      backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);
      border:1px solid var(--sep);border-radius:16px;box-shadow:var(--shadow);color:var(--label);
      opacity:0;transform:scale(.92);pointer-events:none;transition:opacity .22s ease-out, transform .22s cubic-bezier(.2,.9,.3,1.25)}
    .panel.show{opacity:1;transform:scale(1);pointer-events:auto}
    .panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:grab;font-weight:600;font-size:15px;border-bottom:1px solid var(--sep);touch-action:none}
    .panel-head:active{cursor:grabbing}
    .panel-close{width:26px;height:26px;border-radius:50%;background:rgba(120,120,128,.18);display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--label-2)}
    .panel-close:hover{background:var(--red);color:#fff}
    .panel-body{padding:12px 14px}
    .bar-row{display:flex;align-items:center;padding:6px 0;gap:10px}
    .bar-row .l{width:48px;font-size:12px;color:var(--label-2)}
    .bar-row .bar{flex:1;height:7px;background:rgba(120,120,128,.2);border-radius:999px;overflow:hidden}
    .bar-row .bar>i{display:block;height:100%;border-radius:999px;transition:.3s}
    .bar-row .v{width:32px;text-align:right;font-size:12px;color:var(--label-2);font-variant-numeric:tabular-nums}
    .qa{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
    .qa button,.full button{all:unset;text-align:center;box-sizing:border-box;padding:10px;border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;background:rgba(120,120,128,.16);color:var(--tint)}
    .qa button.p{background:var(--tint);color:#fff}
    .qa button:hover,.full button:hover{filter:brightness(1.05)}
    .full{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
    .full button.q{color:var(--red)}
  </style>
</head>
<body>
  <div id="stage"><canvas id="kaka"></canvas></div>

  <div id="hovercard" class="hovercard"></div>

  <div id="radial" class="radial">
    <button class="rad-btn" data-a="feed">🍔<span class="rad-tip">喂食</span></button>
    <button class="rad-btn" data-a="pat">🤚<span class="rad-tip">摸头</span></button>
    <button class="rad-btn" data-a="card">🎛<span class="rad-tip">面板</span></button>
    <button class="rad-btn" data-a="dnd">🔕<span class="rad-tip">勿扰</span></button>
    <button class="rad-btn" data-a="open">🖥<span class="rad-tip">完整版</span></button>
    <button class="rad-btn" data-a="quit">🛑<span class="rad-tip">退出</span></button>
  </div>

  <div id="cmd-card" class="panel">
    <div class="panel-head" id="cmd-head"><span>🐾 Kaka 主控制面板</span><span class="panel-close" id="cmd-close">×</span></div>
    <div class="panel-body">
      <div class="bar-row"><div class="l">🍚 饥饿</div><div class="bar"><i id="b-hunger" style="background:var(--tint)"></i></div><div class="v" id="v-hunger">0</div></div>
      <div class="bar-row"><div class="l">😊 心情</div><div class="bar"><i id="b-mood" style="background:var(--pink)"></i></div><div class="v" id="v-mood">0</div></div>
      <div class="bar-row"><div class="l">💛 好感</div><div class="bar"><i id="b-affinity" style="background:var(--orange)"></i></div><div class="v" id="v-affinity">0</div></div>
      <div class="qa">
        <button class="p" data-a="feed">🍔 喂食</button>
        <button data-a="pat">🤚 摸头</button>
        <button data-a="dnd" id="card-dnd">🔕 勿扰</button>
        <button data-a="card-close">✓ 收起</button>
      </div>
      <div class="full">
        <button data-a="open">🖥 完整版</button>
        <button class="q" data-a="quit">🛑 退出</button>
      </div>
    </div>
  </div>

  <script>
  (() => {
    'use strict';

    const STORAGE_KEY = 'kaka_desktop_state_v1';
    const isElectron = !!(window.kaka && window.kaka.isElectron);

    const canvas = document.getElementById('kaka');
    const ctx = canvas.getContext('2d');
    const radialEl = document.getElementById('radial');
    const hoverEl = document.getElementById('hovercard');
    const cardEl = document.getElementById('cmd-card');

    let W = 0, H = 0, dpr = 1;
    const PET_SIZE = 88, FLOOR_MARGIN = 10;

    function resize(){ dpr = window.devicePixelRatio || 1; W = Math.max(1, window.innerWidth|0); H = Math.max(1, window.innerHeight|0); canvas.width = Math.floor(W*dpr); canvas.height = Math.floor(H*dpr); ctx.setTransform(dpr,0,0,dpr,0,0); }
    window.addEventListener('resize', resize); resize();

    const clamp = (v, lo, hi) => v < lo ? lo : (v > hi ? hi : v);

    let state = { hunger: 70, mood: 75, affinity: 10, dnd: false, lastUpdated: Date.now(), personality: 'desktop' };

    function applyLoadedState(loaded){ if(!loaded||typeof loaded!=='object')return; const now=Date.now(),last=loaded.lastUpdated||now,hours=Math.max(0,(now-last)/3600000); state=Object.assign({},state,loaded); state.hunger=clamp((state.hunger||0)-hours*6,0,100); state.mood=clamp((state.mood||0)-hours*3,0,100); document.body.classList.toggle('dnd',!!state.dnd); }
    function hydrate(){ try{ const raw=localStorage.getItem(STORAGE_KEY); if(raw) applyLoadedState(JSON.parse(raw)); }catch(e){} }
    let saveTimer=null;
    function scheduleSave(){ if(saveTimer)return; saveTimer=setTimeout(()=>{ saveTimer=null; state.lastUpdated=Date.now(); try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){} },1200); }

    const pet = { x:60, y:0, vx:0.9, vy:0, facing:1, rot:0, angVel:0, bubbleText:'', bubbleUntil:0, pattedAt:0, dragging:false, dragOffX:0, dragOffY:0, dragHistory:[] };
    function floorY(){ return H - PET_SIZE - FLOOR_MARGIN; }
    function petRect(){ return { x:pet.x, y:pet.y, w:PET_SIZE, h:PET_SIZE }; }
    function pointInRect(px,py,r){ return px>=r.x && px<=r.x+r.w && py>=r.y && py<=r.y+r.h; }

    // ---------- drawing ----------
    function drawPet(){
      const size=PET_SIZE,g=16,c=size/g; const S={body:'#F5C542',dark:'#C08A18',cheek:'#F58A8A',eye:'#222',white:'#fff'};
      function R(px,py,w,h,col){ ctx.fillStyle=col; ctx.fillRect(px*c,py*c,w*c,h*c); }
      ctx.save(); ctx.translate(pet.x+size/2,pet.y+size/2); ctx.rotate(pet.rot); if(pet.facing<0)ctx.scale(-1,1); ctx.translate(-size/2,-size/2); ctx.imageSmoothingEnabled=false;
      R(4,3,8,1,S.body);R(3,4,10,1,S.body);R(2,5,12,6,S.body);R(3,11,10,1,S.body);R(4,12,8,1,S.body);R(4,13,3,1,S.body);R(9,13,3,1,S.body);
      R(3,10,10,1,S.dark);R(4,11,8,1,S.dark);
      R(5,6,2,2,S.white);R(9,6,2,2,S.white);R(6,7,1,1,S.eye);R(10,7,1,1,S.eye);R(4,9,1,1,S.cheek);R(11,9,1,1,S.cheek);
      if(state.hunger<35)R(7,9,2,2,S.eye);else R(7,10,2,1,S.eye);
      ctx.restore();
    }
    let lastBubbleRect=null;
    function drawBubble(){
      lastBubbleRect=null; if(!pet.bubbleText||performance.now()>pet.bubbleUntil||state.dnd)return;
      const text=pet.bubbleText,cx=pet.x+PET_SIZE/2,cy=pet.y-12;
      ctx.save(); ctx.font='12px -apple-system,"PingFang SC",system-ui';
      const w=ctx.measureText(text).width+18,h=24,x=cx-w/2,y=cy-h,r=10; lastBubbleRect={x,y,w,h:h+8};
      ctx.fillStyle='rgba(28,28,30,.92)'; ctx.beginPath();
      ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
      ctx.lineTo(cx+6,y+h);ctx.lineTo(cx,y+h+6);ctx.lineTo(cx-6,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.fill();
      ctx.fillStyle='#fff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,cx,y+h/2);ctx.restore();
    }
    function drawFloor(){ const y=H-FLOOR_MARGIN; ctx.strokeStyle='rgba(120,120,128,.14)'; ctx.setLineDash([6,8]); ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke(); ctx.setLineDash([]); }
    function draw(){ ctx.clearRect(0,0,W,H); drawFloor(); if(state.dnd){ctx.save();ctx.globalAlpha=0.15;drawPet();ctx.restore();}else drawPet(); drawBubble(); }

    // ---------- bubbles ----------
    const MONOLOGUES=['摸鱼快乐 🐟','你在干嘛呀','再摸一下嘛~','有零食吗 🍪','今天也要加油','我会一直在这儿','喵～'];
    function showBubble(text,ms){ if(state.dnd)return; pet.bubbleText=text; pet.bubbleUntil=performance.now()+(ms||1600); }
    setInterval(()=>{ if(state.dnd)return; if(Math.random()<0.45) showBubble(MONOLOGUES[(Math.random()*MONOLOGUES.length)|0],1800); },9000);

    // ---------- update ----------
    function step(dtMs){
      const dt=dtMs/16.67, floor=floorY();
      const minutes=dtMs/60000;
      state.hunger=clamp(state.hunger-minutes*3.5,0,100); state.mood=clamp(state.mood-minutes*1.4,0,100); if(state.hunger>70)state.mood=clamp(state.mood+minutes*1.6,0,100); scheduleSave();
      if(pet.dragging){ pet.vx=0;pet.vy=0;pet.rot*=0.8;pet.angVel*=0.7; return; }
      const g=0.55; pet.vy+=g*dt;
      const onGround=Math.abs(pet.y-floor)<0.5 && Math.abs(pet.vy)<0.8;
      if(onGround && !state.dnd){ const walk=0.9; pet.vx=clamp(pet.vx,-4,4); if(Math.abs(pet.vx)<walk)pet.vx+=(pet.facing>0?0.03:-0.03)*dt; }
      pet.x+=pet.vx*dt; pet.y+=pet.vy*dt; pet.rot+=pet.angVel*dt;
      if(pet.x<6){pet.x=6;pet.vx=Math.abs(pet.vx)*0.9;pet.facing=1;}
      if(pet.x>W-PET_SIZE-6){pet.x=W-PET_SIZE-6;pet.vx=-Math.abs(pet.vx)*0.9;pet.facing=-1;}
      if(pet.y>floor){ pet.y=floor; if(pet.vy>0){ pet.vy=-pet.vy*0.45; pet.vx*=0.92; pet.angVel*=0.85; if(Math.abs(pet.vy)<1.0)pet.vy=0; } }
      if(Math.abs(pet.vx)>0.2) pet.facing=pet.vx>=0?1:-1;
      pet.rot*=0.985; pet.angVel*=0.99;
    }
    let lastT=performance.now();
    function loop(t){ const dt=Math.min(60,t-lastT); lastT=t; step(dt); if(cardEl.classList.contains('show'))syncCard(); if(hoverEl.classList.contains('show'))positionHover(); draw(); requestAnimationFrame(loop); }

    // ---------- helpers ----------
    function canvasPointFromEvent(e){ const r=canvas.getBoundingClientRect(); return { x:e.clientX-r.left, y:e.clientY-r.top }; }
    function doPat(){ if(state.dnd)return; state.mood=clamp(state.mood+6,0,100); state.affinity=clamp(state.affinity+2,0,100); const now=performance.now(); showBubble(now-pet.pattedAt<420?'喵～ 别摸了 🫣':'摸摸～', now-pet.pattedAt<420?1500:1200); pet.pattedAt=now; scheduleSave(); }
    function toggleDnd(){ state.dnd=!state.dnd; document.body.classList.toggle('dnd',!!state.dnd); showBubble(state.dnd?'🔕 已勿扰':'👋 我又出现啦',1400); scheduleSave(); }
    function openWeb(){ if(isElectron){ /* main handles */ } try{ window.open('https://ustiniankw.github.io/Kaka/','_blank','noopener,noreferrer'); }catch(e){} }
    function quitApp(){ if(isElectron){ try{ window.kaka.quit(); }catch(e){} } else showBubble('这个按钮只在桌面版生效',1600); }
    function handleAction(a){
      if(a==='feed'){ state.hunger=clamp(state.hunger+25,0,100); state.mood=clamp(state.mood+8,0,100); showBubble('好吃好吃 🍪',1600); }
      else if(a==='pat'){ state.mood=clamp(state.mood+6,0,100); state.affinity=clamp(state.affinity+2,0,100); showBubble('摸摸～',1400); }
      else if(a==='dnd'){ toggleDnd(); }
      else if(a==='card'){ openCard(); }
      else if(a==='card-close'){ closeCard(); }
      else if(a==='open'){ openWeb(); }
      else if(a==='quit'){ quitApp(); }
      scheduleSave();
    }

    // ---------- radial ----------
    let radialOpen=false;
    function openRadial(){ if(state.dnd){ toggleDnd(); return; }
      const cx=pet.x+PET_SIZE/2, cy=pet.y+PET_SIZE/2;
      radialEl.style.left=cx+'px'; radialEl.style.top=cy+'px';
      const btns=radialEl.querySelectorAll('.rad-btn'), n=btns.length, R=92;
      for(let i=0;i<n;i++){ const ang=(-90+i*(360/n))*Math.PI/180; btns[i].style.left=(cx+Math.cos(ang)*R)+'px'; btns[i].style.top=(cy+Math.sin(ang)*R)+'px'; btns[i].style.transitionDelay=(i*40)+'ms'; }
      radialEl.classList.add('show'); radialOpen=true; hideHover(); updateClickThrough();
    }
    function closeRadial(){ if(!radialOpen)return; radialEl.classList.remove('show'); radialOpen=false; radialEl.querySelectorAll('.rad-btn').forEach(b=>b.style.transitionDelay='0ms'); updateClickThrough(); }
    radialEl.querySelectorAll('.rad-btn').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); const a=b.getAttribute('data-a'); closeRadial(); handleAction(a); }));

    // ---------- command card ----------
    let cardOpen=false;
    function syncCard(){ const set=(id,v)=>{const el=document.getElementById(id);if(el)el.style.width=v+'%';}; set('b-hunger',state.hunger);set('b-mood',state.mood);set('b-affinity',state.affinity);
      const sv=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=Math.round(v);}; sv('v-hunger',state.hunger);sv('v-mood',state.mood);sv('v-affinity',state.affinity);
      const cd=document.getElementById('card-dnd'); if(cd)cd.textContent=state.dnd?'🔔 取消勿扰':'🔕 勿扰'; }
    function openCard(){ if(!cardEl.style.left){ cardEl.style.left=Math.max(10,(W-280)/2)+'px'; cardEl.style.top=Math.max(60,H*0.22)+'px'; } cardEl.classList.add('show'); cardOpen=true; syncCard(); hideHover(); updateClickThrough(); }
    function closeCard(){ cardEl.classList.remove('show'); cardOpen=false; updateClickThrough(); }
    document.getElementById('cmd-close').onclick=closeCard;
    cardEl.querySelectorAll('[data-a]').forEach(b=>b.addEventListener('click',(e)=>{ e.stopPropagation(); handleAction(b.getAttribute('data-a')); syncCard(); }));
    // card drag
    (function(){ let dragging=false,offX=0,offY=0; const head=document.getElementById('cmd-head');
      function down(e){ if(e.target.closest('.panel-close'))return; const pt=e.touches?e.touches[0]:e; const r=cardEl.getBoundingClientRect(); dragging=true; offX=pt.clientX-r.left; offY=pt.clientY-r.top; e.preventDefault(); }
      function move(e){ if(!dragging)return; const pt=e.touches?e.touches[0]:e; cardEl.style.left=Math.max(4,Math.min(W-cardEl.offsetWidth-4,pt.clientX-offX))+'px'; cardEl.style.top=Math.max(4,Math.min(H-40,pt.clientY-offY))+'px'; }
      function up(){ dragging=false; }
      head.addEventListener('mousedown',down); document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
      head.addEventListener('touchstart',down,{passive:false}); document.addEventListener('touchmove',move,{passive:false}); document.addEventListener('touchend',up);
    })();

    // ---------- hover status card ----------
    let hoverArmed=false, hoverTimer=null, hoverHide=null;
    function positionHover(){ hoverEl.style.left=(canvas.getBoundingClientRect().left+pet.x+PET_SIZE/2)+'px'; hoverEl.style.top=(canvas.getBoundingClientRect().top+pet.y-6)+'px'; }
    function showHover(){ if(state.dnd)return; hoverEl.innerHTML='<span class="i">🍚 <b>'+Math.round(state.hunger)+'</b></span><span class="i">😊 <b>'+Math.round(state.mood)+'</b></span><span class="i">💛 <b>'+Math.round(state.affinity)+'</b></span>'; positionHover(); hoverEl.classList.add('show'); clearTimeout(hoverHide); hoverHide=setTimeout(hideHover,2000); }
    function hideHover(){ hoverEl.classList.remove('show'); }

    // ---------- pointer interaction ----------
    let tapCount=0, tapTimer=null;
    function onPointerDown(e){
      if(e.button!==0)return; closeRadial();
      const p=canvasPointFromEvent(e); if(!pointInRect(p.x,p.y,petRect()))return;
      pet.dragging=true; pet.dragOffX=p.x-pet.x; pet.dragOffY=p.y-pet.y; pet.dragHistory=[{t:performance.now(),x:p.x,y:p.y}];
      updateClickThrough(); canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId); e.preventDefault();
    }
    function onPointerMove(e){
      const p=canvasPointFromEvent(e);
      if(pet.dragging){ pet.x=clamp(p.x-pet.dragOffX,6,W-PET_SIZE-6); pet.y=clamp(p.y-pet.dragOffY,6,floorY()); pet.dragHistory.push({t:performance.now(),x:p.x,y:p.y}); if(pet.dragHistory.length>6)pet.dragHistory.shift(); const last=pet.dragHistory[pet.dragHistory.length-2]; if(last){const dx=p.x-last.x;pet.angVel=clamp(dx*0.003,-0.12,0.12);} hideHover(); e.preventDefault(); return; }
      // hover
      const over=!state.dnd && pointInRect(p.x,p.y,petRect());
      if(over){ if(!hoverArmed){ hoverArmed=true; clearTimeout(hoverTimer); hoverTimer=setTimeout(showHover,1000); } }
      else { hoverArmed=false; clearTimeout(hoverTimer); hideHover(); }
    }
    function onPointerUp(e){
      if(!pet.dragging)return; pet.dragging=false;
      const h=pet.dragHistory;
      if(h.length>=2){ const a=h[0],b=h[h.length-1],dt=Math.max(10,b.t-a.t); pet.vx=clamp((b.x-a.x)/dt*16.67,-18,18); pet.vy=clamp((b.y-a.y)/dt*16.67,-22,22); pet.angVel=clamp(pet.vx*0.01,-0.16,0.16); }
      pet.dragHistory=[]; updateClickThrough(); e.preventDefault();
    }
    function onClick(e){
      const p=canvasPointFromEvent(e); if(!pointInRect(p.x,p.y,petRect()))return; if(state.dnd)return;
      tapCount++; clearTimeout(tapTimer);
      tapTimer=setTimeout(()=>{ if(tapCount>=2) openCard(); else doPat(); tapCount=0; },250);
    }
    function onContextMenu(e){ const p=canvasPointFromEvent(e); if(!pointInRect(p.x,p.y,petRect()))return; e.preventDefault(); openRadial(); }

    canvas.addEventListener('pointerdown',onPointerDown);
    canvas.addEventListener('pointermove',onPointerMove);
    canvas.addEventListener('pointerup',onPointerUp);
    canvas.addEventListener('pointercancel',onPointerUp);
    canvas.addEventListener('click',onClick);
    canvas.addEventListener('contextmenu',onContextMenu);
    document.addEventListener('click',(e)=>{ if(radialOpen && !e.target.closest('.rad-btn') && e.target!==canvas) closeRadial(); });
    window.addEventListener('keydown',(e)=>{
      if(e.key==='Escape'){ closeRadial(); closeCard(); hideHover(); }
      if((e.ctrlKey||e.metaKey)&&e.shiftKey&&(e.key==='H'||e.key==='h')){ toggleDnd(); e.preventDefault(); }
    });

    // ---------- Electron click-through: any overlay open → interactive ----------
    let ct=false, mx=0, my=0;
    function setClickThrough(v){ if(!isElectron)return; const nv=!!v; if(nv===ct)return; ct=nv; try{ window.kaka.setClickThrough(nv); }catch(e){} }
    function isPointerOverInteractive(clientX,clientY){
      const r=canvas.getBoundingClientRect(); const x=clientX-r.left, y=clientY-r.top;
      if(pointInRect(x,y,petRect()))return true;
      if(lastBubbleRect && pointInRect(x,y,lastBubbleRect))return true;
      return false;
    }
    function overOverlayEl(clientX,clientY){
      // pointer over radial buttons / command card / hover card → interactive
      for(const el of [cardEl, hoverEl]){ if(el.classList.contains('show')){ const r=el.getBoundingClientRect(); if(clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom)return true; } }
      if(radialOpen){ const btns=radialEl.querySelectorAll('.rad-btn'); for(const b of btns){ const r=b.getBoundingClientRect(); if(clientX>=r.left&&clientX<=r.right&&clientY>=r.top&&clientY<=r.bottom)return true; } }
      return false;
    }
    function updateClickThrough(){
      if(!isElectron)return;
      if(pet.dragging){ setClickThrough(false); return; }
      // Any panel/menu open → capture the mouse so users can interact with it.
      if(radialOpen || cardOpen){ setClickThrough(false); return; }
      const over = isPointerOverInteractive(mx,my) || overOverlayEl(mx,my);
      setClickThrough(!over);
    }
    if(isElectron){
      let raf=0;
      document.addEventListener('mousemove',(e)=>{ mx=e.clientX; my=e.clientY; if(raf)return; raf=requestAnimationFrame(()=>{ raf=0; updateClickThrough(); }); });
      setTimeout(()=>setClickThrough(true),500);
    }

    // ---------- boot ----------
    hydrate(); pet.y=floorY(); draw(); requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
