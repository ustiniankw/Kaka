<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Kaka Embed</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Kaka 浏览器扩展远端加载的桌面宠物 UI（薄壳架构）" />
  <style>
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", system-ui, sans-serif; }
    #stage { position: relative; width: 240px; height: 180px; }
    #kaka { width: 240px; height: 180px; display: block; cursor: pointer; }
    #hint { position: absolute; bottom: 2px; left: 0; right: 0; text-align: center;
      font-size: 10px; color: rgba(60, 60, 67, .55); pointer-events: none;
      text-shadow: 0 1px 2px rgba(255, 255, 255, .95); }
    @media (prefers-color-scheme: dark) {
      #hint { color: rgba(235, 235, 245, .6); text-shadow: 0 1px 2px rgba(0, 0, 0, .8); }
    }
    #menu {
      position: absolute; min-width: 130px; background: rgba(28, 28, 30, .96); color: #fff;
      border-radius: 10px; padding: 5px 0; box-shadow: 0 8px 24px rgba(0, 0, 0, .3);
      font-size: 12px; opacity: 0; transform: translateY(4px); pointer-events: none;
      transition: opacity .15s ease, transform .15s ease; z-index: 10;
    }
    #menu.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
    #menu button {
      all: unset; display: flex; align-items: center; gap: 6px; width: 100%;
      padding: 6px 12px; cursor: pointer; box-sizing: border-box;
    }
    #menu button:hover { background: rgba(255, 255, 255, .1); }
    #menu hr { border: 0; margin: 3px 0; border-top: 1px solid rgba(99, 99, 102, .4); }
    body.dnd #kaka { opacity: .18; filter: grayscale(0.6); }
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="kaka" width="240" height="180"></canvas>
    <div id="hint">右键 Kaka · 快捷键 Ctrl+Shift+H 勿扰</div>
    <div id="menu" role="menu"></div>
  </div>
  <script>
  (function () {
    'use strict';

    var CANVAS_W = 240;
    var CANVAS_H = 180;
    var PET_SIZE = 72;
    var FLOOR_MARGIN = 12;
    var STORAGE_KEY = 'kaka_state_v1';

    var canvas = document.getElementById('kaka');
    var ctx = canvas.getContext('2d');
    var menuEl = document.getElementById('menu');
    var body = document.body;

    var inIframe = false;
    try { inIframe = window.top !== window.self; } catch (e) { inIframe = true; }

    var state = {
      hunger: 70,
      mood: 75,
      affinity: 10,
      dnd: false,
      lastUpdated: Date.now(),
      personality: 'extrovert'
    };

    var pet = {
      x: 40,
      y: CANVAS_H - PET_SIZE - FLOOR_MARGIN,
      vx: 0.6,
      facing: 1,
      bubbleText: '',
      bubbleUntil: 0,
      pattedAt: 0
    };

    function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

    // -------- State bridging --------
    var saveTimer = null;
    function scheduleSave() {
      if (saveTimer) return;
      saveTimer = setTimeout(function () {
        saveTimer = null;
        state.lastUpdated = Date.now();
        if (inIframe) {
          try { parent.postMessage({ type: 'kaka:setState', payload: state }, '*'); } catch (e) {}
        }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      }, 2000);
    }

    function applyLoadedState(loaded) {
      if (!loaded || typeof loaded !== 'object') return;
      var now = Date.now();
      var last = loaded.lastUpdated || now;
      var hours = Math.max(0, (now - last) / 3600000);
      state = Object.assign({}, state, loaded);
      state.hunger = clamp((state.hunger || 0) - hours * 6, 0, 100);
      state.mood = clamp((state.mood || 0) - hours * 3, 0, 100);
      body.classList.toggle('dnd', !!state.dnd);
    }

    function hydrate() {
      // 1) Try iframe parent first
      var responded = false;
      function handler(event) {
        var d = event && event.data;
        if (!d || d.type !== 'kaka:state') return;
        responded = true;
        window.removeEventListener('message', handler);
        applyLoadedState(d.payload);
      }
      window.addEventListener('message', handler);
      if (inIframe) {
        try { parent.postMessage({ type: 'kaka:getState' }, '*'); } catch (e) {}
      }
      // 2) Fallback to localStorage after 500ms if no reply
      setTimeout(function () {
        if (responded) return;
        window.removeEventListener('message', handler);
        try {
          var raw = localStorage.getItem(STORAGE_KEY);
          if (raw) applyLoadedState(JSON.parse(raw));
        } catch (e) {}
      }, 500);
    }

    // -------- Sprite drawing --------
    function drawPet() {
      var size = PET_SIZE;
      var g = 16; var c = size / g;
      var S = { body: '#F5C542', dark: '#C08A18', cheek: '#F58A8A', eye: '#222', white: '#fff' };
      // After the translate() below, the drawing origin is at (pet.x, pet.y),
      // so R() should draw pixels relative to that origin — NOT re-add pet.x/pet.y.
      function R(px, py, w, h, col) {
        ctx.fillStyle = col;
        ctx.fillRect(px * c, py * c, w * c, h * c);
      }
      ctx.save();
      ctx.translate(pet.x + size / 2, pet.y + size / 2);
      if (pet.facing < 0) ctx.scale(-1, 1);
      ctx.translate(-size / 2, -size / 2);
      ctx.imageSmoothingEnabled = false;
      // body
      R(4, 3, 8, 1, S.body);
      R(3, 4, 10, 1, S.body);
      R(2, 5, 12, 6, S.body);
      R(3, 11, 10, 1, S.body);
      R(4, 12, 8, 1, S.body);
      R(4, 13, 3, 1, S.body);
      R(9, 13, 3, 1, S.body);
      // belly
      R(3, 10, 10, 1, S.dark);
      R(4, 11, 8, 1, S.dark);
      // face
      R(5, 6, 2, 2, S.white);
      R(9, 6, 2, 2, S.white);
      R(6, 7, 1, 1, S.eye);
      R(10, 7, 1, 1, S.eye);
      R(4, 9, 1, 1, S.cheek);
      R(11, 9, 1, 1, S.cheek);
      // mouth
      var hungry = state.hunger < 35;
      if (hungry) R(7, 9, 2, 2, S.eye);
      else R(7, 10, 2, 1, S.eye);
      ctx.restore();
    }

    function drawBubble() {
      if (!pet.bubbleText || performance.now() > pet.bubbleUntil) return;
      var text = pet.bubbleText;
      var cx = pet.x + PET_SIZE / 2;
      var cy = pet.y - 8;
      ctx.save();
      ctx.font = '11px -apple-system, "PingFang SC"';
      var w = ctx.measureText(text).width + 14;
      var h = 20;
      var x = cx - w / 2;
      var y = cy - h;
      var r = 8;
      ctx.fillStyle = 'rgba(28,28,30,.92)';
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(cx + 4, y + h);
      ctx.lineTo(cx, y + h + 5);
      ctx.lineTo(cx - 4, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, cx, y + h / 2);
      ctx.restore();
    }

    function drawFloor() {
      var y = CANVAS_H - FLOOR_MARGIN;
      ctx.strokeStyle = 'rgba(60,60,67,.15)';
      ctx.setLineDash([4, 6]);
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(CANVAS_W, y);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    function draw() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      drawFloor();
      if (state.dnd) {
        ctx.save(); ctx.globalAlpha = 0.15; drawPet(); ctx.restore();
      } else {
        drawPet();
        drawBubble();
      }
    }

    // -------- Physics / lifecycle --------
    function update(dtMs) {
      var dt = dtMs / 16.67;
      var floor = CANVAS_H - PET_SIZE - FLOOR_MARGIN;
      pet.y = floor;
      if (!state.dnd) {
        pet.x += pet.vx * dt;
        if (pet.x < 4) { pet.x = 4; pet.vx = Math.abs(pet.vx); pet.facing = 1; }
        else if (pet.x > CANVAS_W - PET_SIZE - 4) {
          pet.x = CANVAS_W - PET_SIZE - 4;
          pet.vx = -Math.abs(pet.vx);
          pet.facing = -1;
        }
      }
      var minutes = dtMs / 60000;
      state.hunger = clamp(state.hunger - minutes * 3.5, 0, 100);
      state.mood = clamp(state.mood - minutes * 1.5, 0, 100);
      if (state.hunger > 70) state.mood = clamp(state.mood + minutes * 1.6, 0, 100);
      scheduleSave();
    }

    var lastTime = performance.now();
    function loop(t) {
      var dt = Math.min(80, t - lastTime);
      lastTime = t;
      update(dt);
      draw();
      requestAnimationFrame(loop);
    }

    // -------- Bubbles / monologue --------
    var MONOLOGUES = [
      '摸鱼快乐 🐟', '这个 tab 好熟悉…', '要不然睡一会?', '再看一眼就干活…',
      '有零食吗 🍪', '好想去买个玩具', '老板别过来', '再摸一下嘛~'
    ];
    function showBubble(text, ms) {
      if (state.dnd) return;
      pet.bubbleText = text;
      pet.bubbleUntil = performance.now() + (ms || 1600);
    }
    setInterval(function () {
      if (state.dnd) return;
      if (Math.random() < 0.5) {
        showBubble(MONOLOGUES[(Math.random() * MONOLOGUES.length) | 0], 1800);
      }
    }, 9000);

    // -------- Interaction --------
    canvas.addEventListener('click', function (e) {
      hideMenu();
      if (state.dnd) return;
      state.mood = clamp(state.mood + 4, 0, 100);
      state.affinity = clamp(state.affinity + 1, 0, 100);
      var now = performance.now();
      if (now - pet.pattedAt < 400) {
        showBubble('喵～ 别摸了 🫣', 1500);
      } else {
        showBubble('摸摸～', 1200);
      }
      pet.pattedAt = now;
      scheduleSave();
    });

    canvas.addEventListener('contextmenu', function (e) {
      e.preventDefault();
      var rect = canvas.getBoundingClientRect();
      showMenu(e.clientX - rect.left, e.clientY - rect.top);
    });

    function buildMenu() {
      menuEl.innerHTML = ''
        + '<button data-a="feed">🍪 <span>喂点吃的</span></button>'
        + '<button data-a="pat">🤚 <span>摸摸头</span></button>'
        + '<hr />'
        + '<button data-a="dnd">🔕 <span class="dnd-label">' + (state.dnd ? '关闭勿扰' : '开启勿扰') + '</span></button>'
        + '<button data-a="open">🖥 <span>打开完整体验</span></button>';
    }
    function showMenu(x, y) {
      buildMenu();
      // clamp within stage
      var mw = 130, mh = 130;
      x = clamp(x, 4, CANVAS_W - mw - 4);
      y = clamp(y, 4, CANVAS_H - mh - 4);
      menuEl.style.left = x + 'px';
      menuEl.style.top = y + 'px';
      menuEl.classList.add('show');
    }
    function hideMenu() { menuEl.classList.remove('show'); }
    menuEl.addEventListener('click', function (e) {
      var btn = e.target.closest('button');
      if (!btn) return;
      var a = btn.getAttribute('data-a');
      hideMenu();
      handleAction(a);
    });
    document.addEventListener('click', function (e) {
      if (menuEl.contains(e.target) || e.target === canvas) return;
      hideMenu();
    });

    function openExternal(url) {
      if (inIframe) {
        try { parent.postMessage({ type: 'kaka:open', url: url }, '*'); return; } catch (e) {}
      }
      try { window.open(url, '_blank', 'noopener,noreferrer'); } catch (e) {}
    }

    function handleAction(a) {
      if (a === 'feed') {
        state.hunger = clamp(state.hunger + 25, 0, 100);
        state.mood = clamp(state.mood + 8, 0, 100);
        showBubble('好吃好吃 🍪', 1600);
      } else if (a === 'pat') {
        state.mood = clamp(state.mood + 6, 0, 100);
        state.affinity = clamp(state.affinity + 2, 0, 100);
        showBubble('摸摸～', 1400);
      } else if (a === 'dnd') {
        state.dnd = !state.dnd;
        body.classList.toggle('dnd', !!state.dnd);
      } else if (a === 'open') {
        openExternal('https://ustiniankw.github.io/Kaka/');
      }
      scheduleSave();
    }

    // -------- DND hotkey Ctrl+Shift+H --------
    window.addEventListener('keydown', function (e) {
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'H' || e.key === 'h')) {
        state.dnd = !state.dnd;
        body.classList.toggle('dnd', !!state.dnd);
        scheduleSave();
        showBubble(state.dnd ? '🔕 已勿扰' : '👋 我又出现啦', 1400);
        e.preventDefault();
      }
    });

    // -------- Boot --------
    hydrate();
    draw(); // immediate initial paint so first frame is not blank
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
