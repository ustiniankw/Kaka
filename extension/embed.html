<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Kaka Embed</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="Kaka 浏览器扩展远端加载的桌面宠物 UI（薄壳架构 · pet-first）" />
  <style>
    :root{--glass:rgba(255,255,255,.82);--sep:rgba(60,60,67,.16);--label:#111;--label-2:rgba(60,60,67,.6);--tint:#0A84FF;}
    @media (prefers-color-scheme:dark){:root{--glass:rgba(28,28,30,.85);--sep:rgba(84,84,88,.5);--label:#fff;--label-2:rgba(235,235,245,.6);}}
    html, body { margin: 0; padding: 0; background: transparent; overflow: hidden; user-select: none;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", system-ui, sans-serif; }
    #stage { position: relative; width: 240px; height: 180px; }
    #kaka { width: 240px; height: 180px; display: block; cursor: pointer; }
    body.dnd #kaka { opacity: .18; filter: grayscale(0.6); }

    /* radial menu (simplified: 4 items) */
    .radial{position:absolute;z-index:12;width:0;height:0;pointer-events:none}
    .rad-btn{position:absolute;left:0;top:0;width:38px;height:38px;border:0;border-radius:50%;
      background:var(--glass);backdrop-filter:blur(16px) saturate(180%);-webkit-backdrop-filter:blur(16px) saturate(180%);
      border:1px solid var(--sep);box-shadow:0 6px 18px rgba(0,0,0,.28);color:var(--label);
      font-size:17px;display:flex;align-items:center;justify-content:center;cursor:pointer;
      opacity:0;transform:translate(-50%,-50%) scale(.2);pointer-events:none;
      transition:opacity .16s ease-out, transform .26s cubic-bezier(.2,.9,.3,1.35), background .12s, color .12s}
    .radial.show .rad-btn{opacity:1;transform:translate(-50%,-50%) scale(1);pointer-events:auto}
    .rad-btn:hover{background:var(--tint);color:#fff;transform:translate(-50%,-50%) scale(1.16)}
    .rad-tip{position:absolute;top:42px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;white-space:nowrap;
      background:rgba(28,28,30,.9);color:#fff;padding:1px 6px;border-radius:5px;opacity:0;transition:.12s;pointer-events:none}
    .rad-btn:hover .rad-tip{opacity:1}

    /* hover status card */
    .hovercard{position:absolute;z-index:11;background:var(--glass);backdrop-filter:blur(16px) saturate(180%);
      -webkit-backdrop-filter:blur(16px) saturate(180%);border:1px solid var(--sep);border-radius:10px;padding:5px 9px;
      box-shadow:0 8px 20px rgba(0,0,0,.22);font-size:11px;color:var(--label);white-space:nowrap;
      opacity:0;transform:translate(-50%,-4px);pointer-events:none;transition:.16s}
    .hovercard.show{opacity:1;transform:translate(-50%,-10px)}
    .hovercard .i{display:inline-flex;gap:2px;margin:0 4px}
    .hovercard b{font-variant-numeric:tabular-nums}
  </style>
</head>
<body>
  <div id="stage">
    <canvas id="kaka" width="240" height="180"></canvas>
    <div id="hovercard" class="hovercard"></div>
    <div id="radial" class="radial">
      <button class="rad-btn" data-a="feed">🍔<span class="rad-tip">喂食</span></button>
      <button class="rad-btn" data-a="pat">🤚<span class="rad-tip">摸头</span></button>
      <button class="rad-btn" data-a="dnd">🔕<span class="rad-tip">勿扰</span></button>
      <button class="rad-btn" data-a="open">🖥<span class="rad-tip">完整版</span></button>
    </div>
  </div>
  <script>
  (function () {
    'use strict';

    var CANVAS_W = 240, CANVAS_H = 180, PET_SIZE = 72, FLOOR_MARGIN = 12;
    var STORAGE_KEY = 'kaka_state_v1';

    var canvas = document.getElementById('kaka');
    var ctx = canvas.getContext('2d');
    var radialEl = document.getElementById('radial');
    var hoverEl = document.getElementById('hovercard');
    var body = document.body;

    var inIframe = false;
    try { inIframe = window.top !== window.self; } catch (e) { inIframe = true; }

    function notifyReady() {
      if (!inIframe) return;
      try { parent.postMessage({ type: 'kaka:ready' }, '*'); } catch (e) {}
    }

    var state = { hunger: 70, mood: 75, affinity: 10, dnd: false, lastUpdated: Date.now(), personality: 'extrovert' };
    var pet = { x: 40, y: CANVAS_H - PET_SIZE - FLOOR_MARGIN, vx: 0.6, facing: 1, bubbleText: '', bubbleUntil: 0, pattedAt: 0 };
    var radialOpen = false, hoverArmed = false, hoverTimer = null, hoverHideTimer = null;

    function clamp(v, lo, hi) { return v < lo ? lo : (v > hi ? hi : v); }

    // -------- State bridging --------
    var saveTimer = null;
    function scheduleSave() {
      if (saveTimer) return;
      saveTimer = setTimeout(function () {
        saveTimer = null; state.lastUpdated = Date.now();
        if (inIframe) { try { parent.postMessage({ type: 'kaka:setState', payload: state }, '*'); } catch (e) {} }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch (e) {}
      }, 2000);
    }
    function applyLoadedState(loaded) {
      if (!loaded || typeof loaded !== 'object') return;
      var now = Date.now(), last = loaded.lastUpdated || now, hours = Math.max(0, (now - last) / 3600000);
      state = Object.assign({}, state, loaded);
      state.hunger = clamp((state.hunger || 0) - hours * 6, 0, 100);
      state.mood = clamp((state.mood || 0) - hours * 3, 0, 100);
      body.classList.toggle('dnd', !!state.dnd);
    }
    function hydrate() {
      var responded = false;
      function handler(event) { var d = event && event.data; if (!d || d.type !== 'kaka:state') return; responded = true; window.removeEventListener('message', handler); applyLoadedState(d.payload); }
      window.addEventListener('message', handler);
      if (inIframe) { try { parent.postMessage({ type: 'kaka:getState' }, '*'); } catch (e) {} }
      setTimeout(function () { if (responded) return; window.removeEventListener('message', handler); try { var raw = localStorage.getItem(STORAGE_KEY); if (raw) applyLoadedState(JSON.parse(raw)); } catch (e) {} }, 500);
    }

    // -------- Sprite drawing --------
    function drawPet() {
      var size = PET_SIZE, g = 16, c = size / g;
      var S = { body: '#F5C542', dark: '#C08A18', cheek: '#F58A8A', eye: '#222', white: '#fff' };
      function R(px, py, w, h, col) { ctx.fillStyle = col; ctx.fillRect(px * c, py * c, w * c, h * c); }
      ctx.save(); ctx.translate(pet.x + size / 2, pet.y + size / 2); if (pet.facing < 0) ctx.scale(-1, 1); ctx.translate(-size / 2, -size / 2); ctx.imageSmoothingEnabled = false;
      R(4, 3, 8, 1, S.body); R(3, 4, 10, 1, S.body); R(2, 5, 12, 6, S.body); R(3, 11, 10, 1, S.body); R(4, 12, 8, 1, S.body); R(4, 13, 3, 1, S.body); R(9, 13, 3, 1, S.body);
      R(3, 10, 10, 1, S.dark); R(4, 11, 8, 1, S.dark);
      R(5, 6, 2, 2, S.white); R(9, 6, 2, 2, S.white); R(6, 7, 1, 1, S.eye); R(10, 7, 1, 1, S.eye); R(4, 9, 1, 1, S.cheek); R(11, 9, 1, 1, S.cheek);
      if (state.hunger < 35) R(7, 9, 2, 2, S.eye); else R(7, 10, 2, 1, S.eye);
      ctx.restore();
    }
    function drawBubble() {
      if (!pet.bubbleText || performance.now() > pet.bubbleUntil) return;
      var text = pet.bubbleText, cx = pet.x + PET_SIZE / 2, cy = pet.y - 8;
      ctx.save(); ctx.font = '11px -apple-system, "PingFang SC"';
      var w = ctx.measureText(text).width + 14, h = 20, x = cx - w / 2, y = cy - h, r = 8;
      ctx.fillStyle = 'rgba(28,28,30,.92)'; ctx.beginPath();
      ctx.moveTo(x + r, y); ctx.lineTo(x + w - r, y); ctx.quadraticCurveTo(x + w, y, x + w, y + r); ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h); ctx.lineTo(cx + 4, y + h); ctx.lineTo(cx, y + h + 5); ctx.lineTo(cx - 4, y + h);
      ctx.lineTo(x + r, y + h); ctx.quadraticCurveTo(x, y + h, x, y + h - r); ctx.lineTo(x, y + r); ctx.quadraticCurveTo(x, y, x + r, y); ctx.fill();
      ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; ctx.fillText(text, cx, y + h / 2); ctx.restore();
    }
    function drawFloor() { var y = CANVAS_H - FLOOR_MARGIN; ctx.strokeStyle = 'rgba(120,120,128,.18)'; ctx.setLineDash([4, 6]); ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CANVAS_W, y); ctx.stroke(); ctx.setLineDash([]); }
    function draw() { ctx.clearRect(0, 0, CANVAS_W, CANVAS_H); drawFloor(); if (state.dnd) { ctx.save(); ctx.globalAlpha = 0.15; drawPet(); ctx.restore(); } else { drawPet(); drawBubble(); } }

    // -------- Physics --------
    function update(dtMs) {
      var dt = dtMs / 16.67, floor = CANVAS_H - PET_SIZE - FLOOR_MARGIN; pet.y = floor;
      if (!state.dnd) {
        pet.x += pet.vx * dt;
        if (pet.x < 4) { pet.x = 4; pet.vx = Math.abs(pet.vx); pet.facing = 1; }
        else if (pet.x > CANVAS_W - PET_SIZE - 4) { pet.x = CANVAS_W - PET_SIZE - 4; pet.vx = -Math.abs(pet.vx); pet.facing = -1; }
      }
      var minutes = dtMs / 60000;
      state.hunger = clamp(state.hunger - minutes * 3.5, 0, 100);
      state.mood = clamp(state.mood - minutes * 1.5, 0, 100);
      if (state.hunger > 70) state.mood = clamp(state.mood + minutes * 1.6, 0, 100);
      scheduleSave();
    }
    var lastTime = performance.now();
    function loop(t) { var dt = Math.min(80, t - lastTime); lastTime = t; update(dt); if (hoverEl.classList.contains('show')) positionHover(); draw(); requestAnimationFrame(loop); }

    // -------- Bubbles --------
    var MONOLOGUES = ['摸鱼快乐 🐟', '这个 tab 好熟悉…', '要不然睡一会?', '再看一眼就干活…', '有零食吗 🍪', '好想去买个玩具', '老板别过来', '再摸一下嘛~'];
    function showBubble(text, ms) { if (state.dnd) return; pet.bubbleText = text; pet.bubbleUntil = performance.now() + (ms || 1600); }
    setInterval(function () { if (state.dnd) return; if (Math.random() < 0.5) showBubble(MONOLOGUES[(Math.random() * MONOLOGUES.length) | 0], 1800); }, 9000);

    // -------- Hit test --------
    function petHit(px, py) { return px >= pet.x && px <= pet.x + PET_SIZE && py >= pet.y && py <= pet.y + PET_SIZE; }
    function localPoint(e) { var r = canvas.getBoundingClientRect(); return { x: e.clientX - r.left, y: e.clientY - r.top }; }

    // -------- Left click = pat --------
    canvas.addEventListener('click', function (e) {
      var p = localPoint(e); if (!petHit(p.x, p.y)) { closeRadial(); return; }
      closeRadial(); if (state.dnd) return;
      state.mood = clamp(state.mood + 4, 0, 100); state.affinity = clamp(state.affinity + 1, 0, 100);
      var now = performance.now(); showBubble(now - pet.pattedAt < 400 ? '喵～ 别摸了 🫣' : '摸摸～', now - pet.pattedAt < 400 ? 1500 : 1200);
      pet.pattedAt = now; scheduleSave();
    });

    // -------- Right click on Kaka = radial menu --------
    canvas.addEventListener('contextmenu', function (e) {
      e.preventDefault(); var p = localPoint(e); if (!petHit(p.x, p.y)) return; openRadial();
    });
    // touch long-press → radial
    var touchTimer = null;
    canvas.addEventListener('touchstart', function (e) { if (!e.touches[0]) return; var r = canvas.getBoundingClientRect(); var p = { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top }; if (petHit(p.x, p.y)) touchTimer = setTimeout(openRadial, 300); }, { passive: true });
    canvas.addEventListener('touchmove', function () { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } });
    canvas.addEventListener('touchend', function () { if (touchTimer) { clearTimeout(touchTimer); touchTimer = null; } });

    function openRadial() {
      if (state.dnd) { toggleDnd(); return; }
      var cx = pet.x + PET_SIZE / 2, cy = pet.y + PET_SIZE / 2;
      cx = clamp(cx, 50, CANVAS_W - 50); cy = clamp(cy, 50, CANVAS_H - 46);
      radialEl.style.left = cx + 'px'; radialEl.style.top = cy + 'px';
      var btns = radialEl.querySelectorAll('.rad-btn'), n = btns.length, R = 48;
      for (var i = 0; i < n; i++) {
        var ang = (-90 + i * (360 / n)) * Math.PI / 180;
        btns[i].style.left = (Math.cos(ang) * R) + 'px'; btns[i].style.top = (Math.sin(ang) * R) + 'px';
        btns[i].style.transitionDelay = (i * 40) + 'ms';
      }
      radialEl.classList.add('show'); radialOpen = true; hideHover();
    }
    function closeRadial() { if (!radialOpen) return; radialEl.classList.remove('show'); radialOpen = false; radialEl.querySelectorAll('.rad-btn').forEach(function (b) { b.style.transitionDelay = '0ms'; }); }
    radialEl.querySelectorAll('.rad-btn').forEach(function (b) {
      b.addEventListener('click', function (e) { e.stopPropagation(); var a = b.getAttribute('data-a'); closeRadial(); handleAction(a); });
    });
    document.addEventListener('click', function (e) { if (radialOpen && !e.target.closest('.rad-btn') && e.target !== canvas) closeRadial(); });

    function openExternal(url) { if (inIframe) { try { parent.postMessage({ type: 'kaka:open', url: url }, '*'); return; } catch (e) {} } try { window.open(url, '_blank', 'noopener,noreferrer'); } catch (e) {} }
    function toggleDnd() { state.dnd = !state.dnd; body.classList.toggle('dnd', !!state.dnd); scheduleSave(); showBubble(state.dnd ? '🔕 已勿扰' : '👋 我又出现啦', 1400); }
    function handleAction(a) {
      if (a === 'feed') { state.hunger = clamp(state.hunger + 25, 0, 100); state.mood = clamp(state.mood + 8, 0, 100); showBubble('好吃好吃 🍪', 1600); }
      else if (a === 'pat') { state.mood = clamp(state.mood + 6, 0, 100); state.affinity = clamp(state.affinity + 2, 0, 100); showBubble('摸摸～', 1400); }
      else if (a === 'dnd') { toggleDnd(); }
      else if (a === 'open') { openExternal('https://ustiniankw.github.io/Kaka/'); }
      scheduleSave();
    }

    // -------- Hover status card (hover Kaka > 1s) --------
    canvas.addEventListener('mousemove', function (e) {
      var p = localPoint(e); var over = !state.dnd && petHit(p.x, p.y);
      canvas.style.cursor = over ? 'pointer' : 'default';
      if (over) { if (!hoverArmed) { hoverArmed = true; clearTimeout(hoverTimer); hoverTimer = setTimeout(showHover, 1000); } }
      else { hoverArmed = false; clearTimeout(hoverTimer); hideHover(); }
    });
    canvas.addEventListener('mouseleave', function () { hoverArmed = false; clearTimeout(hoverTimer); hideHover(); });
    function positionHover() { hoverEl.style.left = (pet.x + PET_SIZE / 2) + 'px'; hoverEl.style.top = (pet.y - 6) + 'px'; }
    function showHover() {
      if (state.dnd) return;
      hoverEl.innerHTML = '<span class="i">🍚 <b>' + Math.round(state.hunger) + '</b></span><span class="i">😊 <b>' + Math.round(state.mood) + '</b></span><span class="i">💛 <b>' + Math.round(state.affinity) + '</b></span>';
      positionHover(); hoverEl.classList.add('show');
      clearTimeout(hoverHideTimer); hoverHideTimer = setTimeout(hideHover, 2000);
    }
    function hideHover() { hoverEl.classList.remove('show'); }

    // -------- DND hotkey Ctrl+Shift+H --------
    window.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') { closeRadial(); hideHover(); }
      if ((e.ctrlKey || e.metaKey) && e.shiftKey && (e.key === 'H' || e.key === 'h')) { toggleDnd(); e.preventDefault(); }
    });

    // -------- Boot --------
    notifyReady(); hydrate(); draw(); requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
