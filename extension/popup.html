<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Kaka</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root {
      --bg: #F2F2F7;
      --card: #FFFFFF;
      --sep: rgba(60, 60, 67, .18);
      --tint: #007AFF;
      --label: #000;
      --secondary: rgba(60, 60, 67, .6);
      --radius: 14px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", system-ui, sans-serif;
    }
    @media (prefers-color-scheme: dark) {
      :root { --bg:#000; --card:#1C1C1E; --sep:rgba(84,84,88,.6); --tint:#0A84FF; --label:#fff; --secondary:rgba(235,235,245,.6); }
    }
    body { margin: 0; background: var(--bg); min-width: 280px; max-width: 320px; color: var(--label); }
    .wrap { padding: 12px; }
    .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--sep); padding: 12px 14px; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .title { font-weight: 700; font-size: 18px; }
    .sub { font-size: 12px; color: var(--secondary); }
    .stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 8px; font-size: 12px; }
    .stat { padding: 6px 8px; border-radius: 10px; background: rgba(120, 120, 128, .12); }
    .stat .k { font-size: 10px; color: var(--secondary); }
    .stat .v { font-weight: 600; font-variant-numeric: tabular-nums; }
    .section-title { margin: 12px 0 6px; font-size: 12px; color: var(--secondary); }
    .links { display: flex; flex-direction: column; gap: 6px; }
    .links a {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; border-radius: 10px; background: rgba(120, 120, 128, .12);
      color: var(--tint); text-decoration: none; font-size: 14px; font-weight: 600;
    }
    .links a:hover { background: rgba(120, 120, 128, .2); }
    footer { margin-top: 10px; font-size: 11px; color: var(--secondary); text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <div>
          <div class="title">🐾 Kaka</div>
          <div class="sub" id="subtitle">读取本地状态…</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="k">饥饿</div><div class="v" id="v-hunger">--</div></div>
        <div class="stat"><div class="k">心情</div><div class="v" id="v-mood">--</div></div>
        <div class="stat"><div class="k">好感度</div><div class="v" id="v-aff">--</div></div>
      </div>
      <div class="section-title">快捷入口</div>
      <div class="links">
        <a href="https://ustiniankw.github.io/Kaka/" target="_blank" rel="noreferrer">🖥 打开完整体验 <span>›</span></a>
        <a href="https://github.com/ustiniankw/Kaka" target="_blank" rel="noreferrer">⭐ GitHub 仓库 <span>›</span></a>
        <a href="https://github.com/ustiniankw/Kaka/issues/new" target="_blank" rel="noreferrer">🐛 反馈问题 <span>›</span></a>
      </div>
    </div>
    <footer>薄壳扩展 · UI 由 GitHub Pages 自动加载最新版</footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
